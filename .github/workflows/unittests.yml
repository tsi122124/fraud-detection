name: Unit Tests — Fraud Detection

on:
  push:
    branches: [main, task-1, task-2, task-3]
  pull_request:
    branches: [main, task-1, task-2, task-3]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # Fail on real errors only (syntax errors, undefined names, etc.)
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

          # Report all issues but do not fail the build
          flake8 src/ tests/ --count --statistics --exit-zero

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
